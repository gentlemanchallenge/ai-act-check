version: "3.8"
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://aiactcheck:${DB_PASSWORD}@db:5432/aiactcheck
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@ai-act-check.info}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-jonathan@werbestimme.de}
      - LAUNCH_DATE=${LAUNCH_DATE:-2026-04-15}
      - CRON_SECRET=${CRON_SECRET}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://ai-act-check.info}
      - NEXT_PUBLIC_PLAUSIBLE_DOMAIN=${NEXT_PUBLIC_PLAUSIBLE_DOMAIN}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=aiactcheck
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=aiactcheck
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiactcheck"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
